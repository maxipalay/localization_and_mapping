online_mapping_logger:
  ros__parameters:
    output_root: /tmp/online_mapping_sessions
    session_name: ""
    overwrite_existing_session: false
    body_frame_id: body

    rgb_image_topic: /oak/left/image_rect
    rgb_camera_info_topic: /oak/left/camera_info
    depth_image_topic: /oak/depth
    depth_camera_info_topic: /oak/depth/camera_info
    keyframe_topic: /keyframes
    optimization_result_topic: /optimization_result
    tag_topic: /detections
    tag_tf_lookup_timeout_ms: 50.0
    tag_frame_ids: [1, 2, 3, 4, 5]
    tag_frame_names: [base, object1, object2, object3, object4]

    rgb_match_tolerance_ms: 20.0
    depth_match_tolerance_ms: 50.0
    tag_match_tolerance_ms: 25.0
    tag_aggregation_window_ms: 50.0
    buffer_duration_s: 5.0
    pending_timeout_s: 3.0
    maintenance_period_ms: 250

    require_depth: true
    require_tags: false

    tag_prior_source_path: ""
