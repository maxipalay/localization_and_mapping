serial_no: ''
usb_port_id: ''

rgb_camera:
  color_profile: '640x480x15'
  profile: '640x480x15'
color_info_qos: "SENSOR_DATA"
color_qos: "SENSOR_DATA"

depth_module:
  depth_profile: '640x360x60'
  infra_profile: '640x360x60'
  profile: '640x360x60'
